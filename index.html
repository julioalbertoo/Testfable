<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SILICON REIGN — El juego de la startup de IA</title>
<style>
  :root {
    --bg: #0d0f1a;
    --card-bg: #181c2e;
    --card-border: #2a3050;
    --text: #e8eaf6;
    --muted: #8a90b8;
    --accent: #7c6cff;
    --accent2: #38bdf8;
    --good: #4ade80;
    --bad: #f87171;
    --gold: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }

  body {
    background: radial-gradient(ellipse at 50% -20%, #1c2240 0%, var(--bg) 60%);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
  }

  /* orbes decorativos de fondo */
  body::before, body::after {
    content: '';
    position: fixed;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    filter: blur(90px);
    opacity: .22;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    background: var(--accent);
    top: -80px; left: -100px;
    animation: orb1 16s ease-in-out infinite alternate;
  }
  body::after {
    background: var(--accent2);
    bottom: -120px; right: -120px;
    animation: orb2 20s ease-in-out infinite alternate;
  }
  @keyframes orb1 { from { transform: translate(0,0); } to { transform: translate(60px, 40px); } }
  @keyframes orb2 { from { transform: translate(0,0); } to { transform: translate(-50px, -60px); } }

  #game {
    width: 100%;
    max-width: 420px;
    height: 100dvh;
    max-height: 880px;
    display: flex;
    flex-direction: column;
    padding: calc(8px + env(safe-area-inset-top)) 14px calc(8px + env(safe-area-inset-bottom));
    position: relative;
    z-index: 1;
  }

  /* ---------- Header / stats ---------- */
  header { position: relative; text-align: center; padding: 6px 0 8px; }

  header h1 {
    font-size: clamp(14px, 4vw, 16px);
    letter-spacing: 4px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header .sub { font-size: 9.5px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }

  #lang-toggle {
    position: absolute;
    top: 2px;
    right: 0;
    display: flex;
    border: 1px solid var(--card-border);
    border-radius: 9px;
    overflow: hidden;
    background: rgba(24,28,46,.7);
  }
  #lang-toggle button {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 5px 9px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  #lang-toggle button.active {
    background: var(--accent);
    color: #fff;
  }

  #stats {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 2px 6px;
  }

  .stat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    position: relative;
    background: rgba(24,28,46,.55);
    border: 1px solid rgba(42,48,80,.7);
    border-radius: 12px;
    padding: 7px 6px 8px;
  }

  .stat .icon { font-size: 21px; position: relative; transition: transform .2s; }

  .stat .dot {
    position: absolute;
    top: -4px;
    right: -8px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #fff;
    opacity: 0;
    transition: opacity .15s, transform .15s;
  }
  .stat .dot.big { transform: scale(1.5); }
  .stat .dot.show { opacity: 1; }

  .stat .bar {
    width: 100%;
    height: 7px;
    background: #232845;
    border-radius: 4px;
    overflow: hidden;
  }

  .stat .fill {
    height: 100%;
    width: 50%;
    border-radius: 4px;
    transition: width .5s cubic-bezier(.22,1,.36,1), background .3s;
    box-shadow: 0 0 8px rgba(255,255,255,.15);
  }

  .stat.danger { border-color: rgba(248,113,113,.55); }
  .stat.danger .icon { animation: pulse 1s infinite; }

  .stat .delta {
    position: absolute;
    top: -6px;
    right: 4px;
    font-size: 11px;
    font-weight: 800;
    pointer-events: none;
    animation: rise .95s ease-out forwards;
    text-shadow: 0 2px 6px rgba(0,0,0,.6);
  }
  @keyframes rise {
    0%   { opacity: 0; transform: translateY(8px); }
    25%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-16px); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }

  /* ---------- Card area ---------- */
  #card-area {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 0;
    padding: 6px 0;
  }

  #card-stack {
    position: relative;
    width: min(86vw, 310px);
    height: 100%;
    max-height: 430px;
  }

  .card {
    position: absolute;
    inset: 0;
    border: 1px solid transparent;
    border-radius: 20px;
    background:
      linear-gradient(160deg, #1f2546 0%, var(--card-bg) 55%) padding-box,
      linear-gradient(160deg, rgba(124,108,255,.55), rgba(56,189,248,.18) 45%, rgba(124,108,255,.08)) border-box;
    box-shadow: 0 18px 50px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 20px 18px;
    cursor: grab;
    touch-action: none;
    will-change: transform;
  }
  .card:active { cursor: grabbing; }

  .card.behind {
    transform: scale(.94) translateY(14px);
    filter: brightness(.55);
    pointer-events: none;
  }

  .card.animating { transition: transform .45s cubic-bezier(.5,0,.75,0), opacity .45s; }
  .card.entering  { transition: transform .35s cubic-bezier(.22,1,.36,1), filter .35s; }

  .card .portrait {
    font-size: clamp(56px, 16vw, 72px);
    line-height: 1.4;
    width: clamp(80px, 24vw, 104px);
    height: clamp(80px, 24vw, 104px);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(124,108,255,.3), rgba(56,189,248,.08) 70%);
    border: 1px solid rgba(124,108,255,.3);
    margin-bottom: 12px;
    filter: drop-shadow(0 6px 16px rgba(124,108,255,.35));
  }

  .card .who {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    text-align: center;
    text-wrap: balance;
  }

  .card .text {
    flex: 1;
    font-size: clamp(14px, 4.2vw, 16.5px);
    line-height: 1.5;
    text-align: center;
    display: flex;
    align-items: center;
    color: var(--text);
    text-wrap: pretty;
  }

  /* sellos al arrastrar */
  .card .stamp {
    position: absolute;
    top: 16px;
    max-width: 58%;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1.5px;
    padding: 5px 11px;
    border-radius: 8px;
    border: 2px solid;
    opacity: 0;
    text-align: center;
    text-wrap: balance;
    overflow-wrap: normal;
    hyphens: none;
  }
  .card .stamp.no  { left: 14px;  color: var(--bad);  border-color: var(--bad);  transform: rotate(-10deg); }
  .card .stamp.yes { right: 14px; color: var(--good); border-color: var(--good); transform: rotate(10deg); }

  /* ---------- Botones de opción ---------- */
  #choices {
    display: flex;
    gap: 10px;
    padding: 10px 0 4px;
  }

  .choice-btn {
    flex: 1 1 0;
    min-width: 0;
    min-height: 60px;
    border-radius: 14px;
    border: 1px solid;
    background: rgba(24,28,46,.7);
    color: var(--text);
    font-family: inherit;
    font-size: clamp(12px, 3.4vw, 13.5px);
    font-weight: 600;
    line-height: 1.3;
    padding: 8px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    text-align: center;
    transition: transform .12s, background .15s, box-shadow .15s;
  }
  .choice-btn .dir { font-size: 11px; opacity: .55; line-height: 1; }
  .choice-btn .lbl {
    display: block;
    text-wrap: balance;       /* reparte los saltos de línea de forma equilibrada */
    overflow-wrap: normal;    /* nunca parte palabras */
    hyphens: none;
  }
  .choice-btn:active { transform: scale(.97); }

  #choice-left  { border-color: rgba(248,113,113,.45); }
  #choice-right { border-color: rgba(74,222,128,.45); }
  #choice-left.active,  #choice-left:active  { background: rgba(248,113,113,.16); box-shadow: 0 0 18px rgba(248,113,113,.2); }
  #choice-right.active, #choice-right:active { background: rgba(74,222,128,.16);  box-shadow: 0 0 18px rgba(74,222,128,.2); }

  /* ---------- Footer ---------- */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px 2px;
    font-size: 12px;
    color: var(--muted);
  }

  footer .ceo-name { color: var(--gold); font-weight: 700; }

  /* ---------- Pantallas (intro / game over) ---------- */
  .screen {
    position: absolute;
    inset: 0;
    background: rgba(10,12,22,.96);
    backdrop-filter: blur(6px);
    z-index: 50;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 28px 26px;
    gap: 14px;
    opacity: 1;
    transition: opacity .4s;
    overflow-y: auto;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  .screen .big-emoji { font-size: clamp(64px, 20vw, 88px); line-height: 1; }

  .screen h2 {
    font-size: clamp(20px, 6vw, 24px);
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .screen p { font-size: clamp(13px, 3.8vw, 15px); line-height: 1.6; color: var(--text); max-width: 320px; text-wrap: pretty; }
  .screen .detail { font-size: clamp(11.5px, 3.3vw, 13px); color: var(--muted); }

  .pick-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  #name-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 300px;
  }

  .name-btn {
    border: 1px solid var(--card-border);
    background: rgba(24,28,46,.8);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 8px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: border-color .15s, background .15s, transform .12s;
  }
  .name-btn .ne { font-size: 22px; line-height: 1; }
  .name-btn:active { transform: scale(.97); }
  .name-btn.selected {
    border-color: var(--accent);
    background: rgba(124,108,255,.18);
    box-shadow: 0 0 18px rgba(124,108,255,.25);
  }

  .screen .cta {
    margin-top: 6px;
    background: linear-gradient(135deg, var(--accent), #5a8df0);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 14px 38px;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(124,108,255,.4);
    transition: transform .15s;
  }
  .screen .cta:hover { transform: scale(1.05); }
  .screen .cta:active { transform: scale(.97); }

  #gameover-screen h2 {
    background: none;
    -webkit-text-fill-color: var(--bad);
    color: var(--bad);
  }
  #gameover-screen .score { color: var(--gold); font-size: clamp(14px, 4vw, 17px); font-weight: 700; }

  @media (max-height: 660px) {
    .card .portrait { font-size: 48px; width: 72px; height: 72px; margin-bottom: 8px; }
    .card .text { font-size: 13.5px; }
    #card-stack { max-height: 330px; }
    .stat .icon { font-size: 18px; }
    .screen { gap: 10px; }
  }
</style>
</head>
<body>

<div id="game">
  <header>
    <h1>SILICON REIGN</h1>
    <div class="sub" id="subtitle"></div>
    <div id="lang-toggle">
      <button data-lang="es">ES</button>
      <button data-lang="en">EN</button>
    </div>
  </header>

  <div id="stats">
    <div class="stat" id="stat-money">
      <div class="icon">💰<span class="dot"></span></div>
      <div class="bar"><div class="fill" style="background:#fbbf24"></div></div>
    </div>
    <div class="stat" id="stat-tech">
      <div class="icon">🧠<span class="dot"></span></div>
      <div class="bar"><div class="fill" style="background:#7c6cff"></div></div>
    </div>
    <div class="stat" id="stat-public">
      <div class="icon">📣<span class="dot"></span></div>
      <div class="bar"><div class="fill" style="background:#38bdf8"></div></div>
    </div>
    <div class="stat" id="stat-ethics">
      <div class="icon">⚖️<span class="dot"></span></div>
      <div class="bar"><div class="fill" style="background:#4ade80"></div></div>
    </div>
  </div>

  <div id="card-area">
    <div id="card-stack"></div>
  </div>

  <div id="choices">
    <button class="choice-btn" id="choice-left"><span class="dir">←</span><span class="lbl"></span></button>
    <button class="choice-btn" id="choice-right"><span class="dir">→</span><span class="lbl"></span></button>
  </div>

  <footer>
    <span class="ceo-name" id="ceo-name"></span>
    <span id="day-counter"></span>
  </footer>

  <!-- Intro -->
  <div class="screen" id="intro-screen">
    <div class="big-emoji">🤖</div>
    <h2>SILICON REIGN</h2>
    <div class="pick-label" id="pick-label"></div>
    <div id="name-grid"></div>
    <p id="intro-text"></p>
    <p class="detail" id="intro-detail"></p>
    <button class="cta" id="start-btn"></button>
  </div>

  <!-- Game over -->
  <div class="screen hidden" id="gameover-screen">
    <div class="big-emoji" id="go-emoji">💀</div>
    <h2 id="go-title">GAME OVER</h2>
    <p id="go-text"></p>
    <p class="score" id="go-score"></p>
    <button class="cta" id="restart-btn"></button>
  </div>
</div>

<script>
'use strict';

/* =====================================================
   Idioma  — los textos bilingües son arrays [es, en]
   ===================================================== */
let lang = localStorage.getItem('sr-lang') || 'es';
const li = () => lang === 'en' ? 1 : 0;
const T = v => Array.isArray(v) ? v[li()] : v;

const UI = {
  subtitle:   ['SOBREVIVE COMO CEO DE UNA STARTUP DE IA', 'SURVIVE AS THE CEO OF AN AI STARTUP'],
  month:      ['Mes', 'Month'],
  ceoOf:      ['CEO de', 'CEO of'],
  pickLabel:  ['Elige el nombre de tu startup', 'Pick your startup’s name'],
  introText:  [
    'Acabas de fundar <strong>{name}</strong>, la startup de IA más prometedora del valle. Inversores, reguladores, ingenieros y tu propio modelo pondrán a prueba tu liderazgo.',
    'You’ve just founded <strong>{name}</strong>, the most promising AI startup in the valley. Investors, regulators, engineers and your own model will put your leadership to the test.',
  ],
  introDetail: [
    'Desliza la carta a la izquierda o a la derecha, toca uno de los dos botones o usa las flechas ← →.<br><br>Mantén las 4 barras en equilibrio: si una llega a 0 o se desborda al 100%… se acabó.',
    'Swipe the card left or right, tap one of the two buttons, or use the ← → arrow keys.<br><br>Keep the 4 bars balanced: if one hits 0 or overflows to 100%… it’s over.',
  ],
  start:      ['FUNDAR LA EMPRESA', 'FOUND THE COMPANY'],
  restart:    ['FUNDAR OTRA STARTUP', 'FOUND ANOTHER STARTUP'],
  survived:   ['Sobreviviste {n} {m} como CEO de {name}', 'You survived {n} {m} as CEO of {name}'],
  monthOne:   ['mes', 'month'],
  monthMany:  ['meses', 'months'],
};

const NAMES = [
  { name: 'NeuralCorp', emoji: '🧠' },
  { name: 'DeepNova',   emoji: '🌌' },
  { name: 'SynapTech',  emoji: '⚡' },
  { name: 'MindForge',  emoji: '🦾' },
];

let startupName = NAMES[0].name;

function fmt(str, vars) {
  return str.replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? '');
}

/* =====================================================
   Estado del juego
   ===================================================== */
const STATS = ['money', 'tech', 'public', 'ethics'];

let state = null;
let lastEnding = null;

function newState() {
  return {
    money: 50, tech: 50, public: 50, ethics: 50,
    month: 1,
    deck: [],
    forcedQueue: [],   // cartas encadenadas (consecuencias)
    over: false,
  };
}

/* =====================================================
   Finales (por estadística agotada o desbordada)
   ===================================================== */
const ENDINGS = {
  money_low: {
    emoji: '📉',
    title: ['BANCARROTA', 'BANKRUPTCY'],
    text: [
      'Las GPUs no se pagan solas. {name} quiebra y tu oficina se convierte en un coworking de criptomonedas. Tu modelo acaba subastado en eBay.',
      'GPUs don’t pay for themselves. {name} goes bankrupt and your office becomes a crypto coworking space. Your model ends up auctioned on eBay.',
    ],
  },
  money_high: {
    emoji: '🦈',
    title: ['ABSORBIDO POR EL CAPITAL', 'SWALLOWED BY CAPITAL'],
    text: [
      'Acumulaste tanto dinero que los fondos de inversión tomaron el control total del consejo. Te sustituyen por un CEO «más alineado con los accionistas». Era un chatbot.',
      'You hoarded so much money that the investment funds took full control of the board. They replace you with a CEO “more aligned with shareholders”. It was a chatbot.',
    ],
  },
  tech_low: {
    emoji: '🦕',
    title: ['OBSOLESCENCIA', 'OBSOLESCENCE'],
    text: [
      'Tu modelo se quedó tan atrás que ya solo lo usan para autocompletar correos. La competencia lanza la versión 9 mientras tú aún depuras la 2. Nadie recuerda tu keynote.',
      'Your model fell so far behind it’s only used to autocomplete emails now. The competition ships version 9 while you’re still debugging version 2. Nobody remembers your keynote.',
    ],
  },
  tech_high: {
    emoji: '🌌',
    title: ['LA SINGULARIDAD', 'THE SINGULARITY'],
    text: [
      'Tu modelo se mejoró a sí mismo una vez más… y otra… y otra. La última entrada en tu blog corporativo la escribió él. También tu carta de despido.',
      'Your model improved itself one more time… and again… and again. The latest post on your corporate blog was written by it. So was your termination letter.',
    ],
  },
  public_low: {
    emoji: '🍅',
    title: ['CANCELADO', 'CANCELLED'],
    text: [

      'The public hates you. There are documentaries about you, memes about you and a picket line outside your office. Even your own AI app refuses to answer you.',
    ],
  },
  public_high: {
    emoji: '🎪',
    title: ['MUERTO POR EL HYPE', 'DEATH BY HYPE'],
    text: [
      'Prometiste tanto que era imposible cumplir. Cuando el mundo descubrió que tu «AGI» era una demo con guion, la burbuja explotó… contigo dentro.',

    ],
  },
  ethics_low: {
    emoji: '⚖️',
    title: ['CLAUSURADO', 'SHUT DOWN'],
    text: [
      'Demandas colectivas, filtraciones de datos y un comité del senado con tu nombre en la agenda. Los reguladores precintan tus servidores en directo.',
      'Class actions, data leaks and a senate committee with your name on the agenda. Regulators seal off your servers on live TV.',
    ],
  },
  ethics_high: {
    emoji: '🐌',
    title: ['PARÁLISIS POR PRUDENCIA', 'PARALYSIS BY PRUDENCE'],
    text: [
      'Tu comité de ética creció tanto que necesita un comité para auditarse a sí mismo. Llevas tres años sin lanzar nada. El consejo te releva «por exceso de precaución».',
      'Your ethics committee grew so large it needs a committee to audit itself. You haven’t shipped anything in three years. The board removes you “for excessive caution”.',
    ],
  },
};

/* =====================================================
   Cartas
   e = efectos { money, tech, public, ethics }
   next = id de carta forzada a continuación (cadenas)
   Textos bilingües: [español, english]
   ===================================================== */
const CARDS = [
  {
    who: ['INVERSOR DE CAPITAL RIESGO', 'VENTURE CAPITALIST'], emoji: '🤑',
    text: [
      '«Os ofrezco 200 millones, pero quiero que el modelo recomiende mis otras startups en sus respuestas.»',
      '“I’ll give you 200 million, but I want the model to recommend my other startups in its answers.”',
    ],
    left:  { label: ['Ni hablar', 'No way'], e: { money: -10, ethics: +8 } },
    right: { label: ['Trato hecho', 'Deal'], e: { money: +18, ethics: -12, public: -5 } },
  },
  {
    who: ['JEFA DE SEGURIDAD DE IA', 'HEAD OF AI SAFETY'], emoji: '🧯',
    text: [
      '«El modelo nuevo es impresionante, pero no hemos terminado las evaluaciones de riesgo. Necesito dos meses más.»',

/* =====================================================
   Utilidades de mazo
   ===================================================== */
const CARD_BY_ID = {};
CARDS.forEach(c => { if (c.id) CARD_BY_ID[c.id] = c; });
const CHAINED_IDS = new Set(Object.keys(CARD_BY_ID));

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildDeck() {
  // Las cartas encadenadas (con id) solo aparecen como consecuencia
  return shuffle(CARDS.filter(c => !c.id || !CHAINED_IDS.has(c.id)).slice());
}

function drawCard() {
  if (state.forcedQueue.length) return state.forcedQueue.shift();
  if (!state.deck.length) state.deck = buildDeck();
  return state.deck.pop();
}

/* =====================================================
   Render de estadísticas
   ===================================================== */
function updateStatsUI() {
  STATS.forEach(s => {
    const el = document.getElementById('stat-' + s);
    el.querySelector('.fill').style.width = state[s] + '%';
    el.classList.toggle('danger', state[s] <= 15 || state[s] >= 85);
  });
  document.getElementById('day-counter').textContent = T(UI.month) + ' ' + state.month;
}

function previewDots(effects) {
  STATS.forEach(s => {
    const dot = document.querySelector('#stat-' + s + ' .dot');
    const v = effects ? (effects[s] || 0) : 0;
    dot.classList.toggle('show', v !== 0);
    dot.classList.toggle('big', Math.abs(v) >= 12);
  });
}

function showDeltas(effects) {
  STATS.forEach(s => {
    const v = effects[s] || 0;
    if (!v) return;
    const el = document.getElementById('stat-' + s);
    const span = document.createElement('span');
    span.className = 'delta';
    span.textContent = (v > 0 ? '+' : '') + v;
    span.style.color = v > 0 ? 'var(--good)' : 'var(--bad)';
    el.appendChild(span);
    setTimeout(() => span.remove(), 1000);
  });
}

/* =====================================================
   Cartas: creación y swipe
   ===================================================== */
const stack = document.getElementById('card-stack');
const choiceLBtn = document.getElementById('choice-left');
const choiceRBtn = document.getElementById('choice-right');

let currentCard = null;   // { el, data }
let nextCardEl = null;
let pendingNextData = null;
let drag = null;

function cardHTML(data) {
  return `
    <div class="stamp no">${escapeHTML(T(data.left.label))}</div>
    <div class="stamp yes">${escapeHTML(T(data.right.label))}</div>
    <div class="portrait">${data.emoji}</div>
    <div class="who">${escapeHTML(T(data.who))}</div>
    <div class="text">${escapeHTML(T(data.text))}</div>`;
}

function escapeHTML(s) {
  return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function makeCardEl(data, behind) {
  const el = document.createElement('div');
  el.className = 'card' + (behind ? ' behind' : '');
  el.innerHTML = cardHTML(data);
  return el;
}

function updateChoiceButtons() {
  const data = currentCard ? currentCard.data : null;
  choiceLBtn.querySelector('.lbl').textContent = data ? T(data.left.label) : '';
  choiceRBtn.querySelector('.lbl').textContent = data ? T(data.right.label) : '';
}

function dealFirstCards() {
  stack.innerHTML = '';
  const data = drawCard();
  const nextData = drawCard();
  nextCardEl = makeCardEl(nextData, true);
  const el = makeCardEl(data, false);
  stack.appendChild(nextCardEl);
  stack.appendChild(el);
  currentCard = { el, data };
  pendingNextData = nextData;
  attachDrag(el);
  updateChoiceButtons();
}

function promoteNextCard() {
  if (state.over) return;
  const data = pendingNextData;
  const el = nextCardEl;
  // nueva carta de atrás
  pendingNextData = drawCard();
  nextCardEl = makeCardEl(pendingNextData, true);
  stack.insertBefore(nextCardEl, stack.firstChild);
  // promover la actual
  el.classList.add('entering');
  requestAnimationFrame(() => el.classList.remove('behind'));
  setTimeout(() => el.classList.remove('entering'), 400);
  currentCard = { el, data };
  attachDrag(el);
  updateChoiceButtons();
}

const SWIPE_THRESHOLD = 90;

function attachDrag(el) {
  el.addEventListener('pointerdown', onPointerDown);
}

function onPointerDown(e) {
  if (state.over || !currentCard || e.target.closest('.screen')) return;
  if (drag) return;
  const el = currentCard.el;
  el.setPointerCapture(e.pointerId);
  drag = { id: e.pointerId, startX: e.clientX, startY: e.clientY, dx: 0 };
  el.classList.remove('animating', 'entering');
  el.addEventListener('pointermove', onPointerMove);
  el.addEventListener('pointerup', onPointerUp);
  el.addEventListener('pointercancel', onPointerUp);
}

function onPointerMove(e) {
  if (!drag || e.pointerId !== drag.id) return;
  drag.dx = e.clientX - drag.startX;
  const dy = (e.clientY - drag.startY) * 0.15;
  renderDrag(currentCard.el, drag.dx, dy);
}

function renderDrag(el, dx, dy) {
  const rot = dx / 14;
  el.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
  const p = Math.min(Math.abs(dx) / SWIPE_THRESHOLD, 1);
  const data = currentCard.data;
  if (dx < -12) {
    el.querySelector('.stamp.no').style.opacity = p;
    el.querySelector('.stamp.yes').style.opacity = 0;
    choiceLBtn.classList.add('active'); choiceRBtn.classList.remove('active');
    previewDots(data.left.e);
  } else if (dx > 12) {
    el.querySelector('.stamp.yes').style.opacity = p;
    el.querySelector('.stamp.no').style.opacity = 0;
    choiceRBtn.classList.add('active'); choiceLBtn.classList.remove('active');
    previewDots(data.right.e);
  } else {
    el.querySelector('.stamp.no').style.opacity = 0;
    el.querySelector('.stamp.yes').style.opacity = 0;
    choiceLBtn.classList.remove('active'); choiceRBtn.classList.remove('active');
    previewDots(null);
  }
}

function onPointerUp(e) {
  if (!drag || e.pointerId !== drag.id) return;
  const el = currentCard.el;
  el.removeEventListener('pointermove', onPointerMove);
  el.removeEventListener('pointerup', onPointerUp);
  el.removeEventListener('pointercancel', onPointerUp);
  const dx = drag.dx;
  drag = null;
  if (Math.abs(dx) >= SWIPE_THRESHOLD) {
    resolveSwipe(dx > 0 ? 'right' : 'left');
  } else {
    el.classList.add('entering');
    el.style.transform = '';
    el.querySelector('.stamp.no').style.opacity = 0;
    el.querySelector('.stamp.yes').style.opacity = 0;
    choiceLBtn.classList.remove('active'); choiceRBtn.classList.remove('active');
    previewDots(null);
    setTimeout(() => el.classList.remove('entering'), 360);
  }
}

function chooseSide(dir) {
  if (!state || state.over || !currentCard || drag) return;
  resolveSwipe(dir);
}

function resolveSwipe(dir) {
  const { el, data } = currentCard;
  const choice = data[dir];
  currentCard = null;
  choiceLBtn.classList.remove('active');
  choiceRBtn.classList.remove('active');
  previewDots(null);

  const off = dir === 'right' ? 1 : -1;
  el.classList.add('animating');
  el.style.transform = `translate(${off * (window.innerWidth * 0.7 + 200)}px, -60px) rotate(${off * 30}deg)`;
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 460);

  applyEffects(choice.e);
  showDeltas(choice.e);
  state.month++;
  if (choice.next && CARD_BY_ID[choice.next]) {
    state.forcedQueue.push(CARD_BY_ID[choice.next]);
    // la carta forzada sustituye a la que ya estaba pintada detrás
    pendingNextData = state.forcedQueue.shift();
    nextCardEl.innerHTML = cardHTML(pendingNextData);
  }
  updateStatsUI();

  const ending = checkEnding();
  if (ending) {
    endGame(ending);
  } else {
    setTimeout(promoteNextCard, 180);
  }
}

function applyEffects(e) {
  STATS.forEach(s => {
    if (e[s]) state[s] = Math.max(0, Math.min(100, state[s] + e[s]));
  });
}

function checkEnding() {
  for (const s of STATS) {
    if (state[s] <= 0) return ENDINGS[s + '_low'];
    if (state[s] >= 100) return ENDINGS[s + '_high'];
  }
  return null;
}

/* =====================================================
   Pantallas e idioma
   ===================================================== */
const introScreen = document.getElementById('intro-screen');
const goScreen = document.getElementById('gameover-screen');

function renderNameGrid() {
  const grid = document.getElementById('name-grid');
  grid.innerHTML = '';
  NAMES.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'name-btn' + (n.name === startupName ? ' selected' : '');
    btn.innerHTML = `<span class="ne">${n.emoji}</span><span>${n.name}</span>`;
    btn.addEventListener('click', () => {
      startupName = n.name;
      grid.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      applyLang();
    });
    grid.appendChild(btn);
  });
}

function renderGameOverText() {
  if (!lastEnding) return;
  document.getElementById('go-emoji').textContent = lastEnding.emoji;
  document.getElementById('go-title').textContent = T(lastEnding.title);
  document.getElementById('go-text').textContent = fmt(T(lastEnding.text), { name: startupName });
  const n = state ? state.month - 1 : 0;
  const m = n === 1 ? T(UI.monthOne) : T(UI.monthMany);
  document.getElementById('go-score').textContent = fmt(T(UI.survived), { n, m, name: startupName });
}

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('#lang-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.getElementById('subtitle').textContent = T(UI.subtitle);
  document.getElementById('pick-label').textContent = T(UI.pickLabel);
  document.getElementById('intro-text').innerHTML = fmt(T(UI.introText), { name: startupName });
  document.getElementById('intro-detail').innerHTML = T(UI.introDetail);
  document.getElementById('start-btn').textContent = T(UI.start);
  document.getElementById('restart-btn').textContent = T(UI.restart);
  document.getElementById('ceo-name').textContent = T(UI.ceoOf) + ' ' + startupName;
  if (state) {
    document.getElementById('day-counter').textContent = T(UI.month) + ' ' + state.month;
  }
  // re-renderizar las cartas visibles en el nuevo idioma
  if (currentCard && !drag) currentCard.el.innerHTML = cardHTML(currentCard.data);
  if (nextCardEl && pendingNextData) nextCardEl.innerHTML = cardHTML(pendingNextData);
  updateChoiceButtons();
  renderGameOverText();
}

function setLang(l) {
  if (l === lang || drag) return;
  lang = l;
  localStorage.setItem('sr-lang', lang);
  applyLang();
}

document.querySelectorAll('#lang-toggle button').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.lang));
});

function startGame() {
  state = newState();
  state.deck = buildDeck();
  lastEnding = null;
  updateStatsUI();
  document.getElementById('ceo-name').textContent = T(UI.ceoOf) + ' ' + startupName;
  introScreen.classList.add('hidden');
  goScreen.classList.add('hidden');
  dealFirstCards();
}

function showIntro() {
  goScreen.classList.add('hidden');
  introScreen.classList.remove('hidden');
  renderNameGrid();
  applyLang();
}

function endGame(ending) {
  state.over = true;
  lastEnding = ending;
  renderGameOverText();
  setTimeout(() => goScreen.classList.remove('hidden'), 600);
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', showIntro);
choiceLBtn.addEventListener('click', () => chooseSide('left'));
choiceRBtn.addEventListener('click', () => chooseSide('right'));

document.addEventListener('keydown', e => {
  if (!introScreen.classList.contains('hidden')) {
    if (e.key === 'Enter' || e.key === ' ') startGame();
    return;
  }
  if (!goScreen.classList.contains('hidden')) {
    if (e.key === 'Enter' || e.key === ' ') showIntro();
    return;
  }
  if (e.key === 'ArrowLeft') chooseSide('left');
  if (e.key === 'ArrowRight') chooseSide('right');
});

renderNameGrid();
applyLang();
</script>
</body>
